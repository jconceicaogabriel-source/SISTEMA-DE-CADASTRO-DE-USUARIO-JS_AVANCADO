<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Clientes (API)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Cadastro de Clientes 👥</h1>
            <p class="subtitulo">Integração em tempo real usando Fetch API e Banco de Dados CrudCrud.</p>
        </header>
        <section class="form-section">
            <h2>Cadastrar Novo Cliente</h2>
            <!--FORMULARIO, PARA CAPTURA DE DADOS-->
            <form id="formCliente">
                <div class="input-group">
                    <label for="nome">Nome do Cliente:</label>
                    <input type="text" id="nome" placeholder="Digite o nome completo" required>
                </div>
                <div class="input-group">
                    <label for="email">E-mail Corporativo:</label>
                    <input type="email" id="email" placeholder="cliente@empresa.com" required>
                </div>
                <button type="submit">Salvar na Nuvem</button>
            </form>
        </section>
        <section class="list-section">
            <h2>
                Clientes Registrados
                <data id="contadorClientes" class="contador"></data>
            </h2>
            <div class="tabela-responsiva">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th class="txt-centro">Ações</th>
                        </tr>
                    </thead>
                    <!--ALVO DE RENDERIZAÇÃO DINÂMICA POR JS-->
                    <tbody id="tabelaClientesCorpo">
                        <tr>
                            <td colspan="3" class="status-carregando">Carregando dados da API...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <!--INCLUSAO SCRIPT PRINCIPAL COMO MÓDULO ES6-->
    <script type="module" src="JS/app.js"></script>
</body>
</html>
